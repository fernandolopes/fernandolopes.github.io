<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensagem Enviada — Fortaleza em Música</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.7;
    }

    header {
      background: #1a237e;
      color: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: .4rem;
    }

    header p {
      font-size: .95rem;
      opacity: .85;
    }

    main {
      max-width: 860px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      text-align: center;
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    section h2 {
      font-size: 1.4rem;
      color: #1a237e;
      margin-bottom: 1rem;
    }

    p { margin-bottom: .6rem; }

    a.btn {
      display: inline-block;
      margin-top: 1.2rem;
      padding: .65rem 1.8rem;
      background: #1a237e;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: background .2s;
    }

    a.btn:hover { background: #283593; }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: .85rem;
      color: #888;
    }

    a { color: #1a237e; }
  </style>
</head>
<body>

<header>
  <h1>Fortaleza em Música</h1>
  <p>Central de Suporte</p>
</header>

<main>
  <section>
    <div class="icon">✅</div>
    <h2>Mensagem enviada com sucesso!</h2>
    <p>
      Recebemos sua solicitação de suporte.<br />
      Nossa equipe responderá em até <strong>3 dias úteis</strong>
      pelo e-mail informado no formulário.
    </p>
    <p>
      Obrigado por entrar em contato!
    </p>
    <a class="btn" href="suporte.html">Voltar ao suporte</a>
  </section>
</main>

<footer>
  <p>© 2026 Fortaleza em Música — <a href="politica-de-uso.html">Política de Uso</a></p>
</footer>

</body>
</html>
